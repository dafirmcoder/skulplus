{% extends "base.html" %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root { --blue:#0f3057; --green:#16a34a; --orange:#f59e0b; --light:#f4f7fb; --card:#ffffff; --border:#e6ecf2; }
body { background:var(--light); font-family:'Poppins',sans-serif; }
.page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.btn-add { background:linear-gradient(135deg,var(--green),#22c55e); color:#fff; padding:10px 16px; border-radius:8px; border:none; font-weight:600; }
.card { background:#fff; border-radius:14px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,0.05); }
table { width:100%; border-collapse:collapse; }
th, td { padding:12px 10px; border-bottom:1px solid var(--border); }
th { color:#777; font-size:13px; }
.actions i { margin-right:10px; cursor:pointer; }
.edit{color:var(--blue)} .delete{color:#dc2626} .view{color:var(--green)}
.badge { padding:5px 10px; border-radius:20px; background:rgba(245,158,11,0.15); color:var(--orange); font-size:12px; }
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.45); display:none; align-items:center; justify-content:center; z-index:1000; }
.modal { background:#fff; width:95%; max-width:600px; border-radius:14px; padding:25px; }
.form-group { margin-bottom:12px; }
.form-control { width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--border); }
.modal-actions { text-align:right; margin-top:12px; }
.btn-save { background:linear-gradient(135deg,var(--blue),#1a73e8); color:#fff; border:none; padding:8px 14px; border-radius:6px; }
.btn-cancel { background:#eee; border:none; padding:8px 12px; border-radius:6px; margin-right:6px; }
</style>


<div class="page-header">
  <h1><i class="fas fa-calendar-day"></i> Term Dates</h1>
  <div>
    <button class="btn-add" id="open-create"><i class="fas fa-plus"></i> New Term Date</button>
  </div>
</div>

<div class="card">
  <table>
    <thead>
      <tr><th>Year</th><th>Term</th><th>Start</th><th>End</th><th>Actions</th></tr>
    </thead>
    <tbody>
      {% for d in dates %}
      <tr>
        <td><strong>{{ d.year }}</strong></td>
        <td><span class="badge">{{ d.term }}</span></td>
        <td>{{ d.start_date }}</td>
        <td>{{ d.end_date }}</td>
        <td class="actions">
          <i class="fas fa-edit edit" data-url="{% url 'edit_term_date' d.id %}" data-year="{{ d.year }}" data-term="{{ d.term }}" data-start="{{ d.start_date }}" data-end="{{ d.end_date }}"></i>
          <i class="fas fa-trash delete delete-btn" data-url="{% url 'delete_term_date' d.id %}"></i>
        </td>
      </tr>
      {% empty %}
      <tr><td colspan="5" style="text-align:center;color:#888">No term dates defined</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<div id="notif" style="position:fixed;right:20px;top:20px;display:none;background:#16a34a;color:#fff;padding:10px 14px;border-radius:8px;z-index:1200"></div>


<!-- MODAL -->
<div class="modal-bg" id="termModal">
  <div class="modal">
    <h2 id="modalTitle">Create Term Date</h2>
    <form id="termForm" method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_year">Year</label>
        <input class="form-control" id="id_year" name="year" type="number" />
      </div>
      <div class="form-group">
        <label for="id_term">Term</label>
        <select class="form-control" id="id_term" name="term">
          <option value="Term 1">Term 1</option>
          <option value="Term 2">Term 2</option>
          <option value="Term 3">Term 3</option>
        </select>
      </div>
      <div class="form-group">
        <label for="id_start">Start Date</label>
        <input class="form-control" id="id_start" name="start_date" type="date" />
      </div>
      <div class="form-group">
        <label for="id_end">End Date</label>
        <input class="form-control" id="id_end" name="end_date" type="date" />
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-save">Save</button>
      </div>
    </form>
  </div>
</div>


<script>
function openModal(){
  document.getElementById('modalTitle').textContent = 'Create Term Date';
  document.getElementById('termForm').dataset.action = '';
  document.getElementById('id_year').value = '';
  document.getElementById('id_term').value = 'Term 1';
  document.getElementById('id_start').value = '';
  document.getElementById('id_end').value = '';
  document.getElementById('termModal').style.display = 'flex';
}
function closeModal(){ document.getElementById('termModal').style.display = 'none'; }

function getCookie(name){ const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)'); return v ? v.pop() : ''; }

const termForm = document.getElementById('termForm');
if(termForm){
  termForm.addEventListener('submit', function(e){
    e.preventDefault();
    const fd = new FormData(this);
    const obj = Object.fromEntries(fd.entries());
    const csrftoken = getCookie('csrftoken');
    const actionUrl = this.dataset.action || '{% url "create_term_date" %}';
    fetch(actionUrl, {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrftoken, 'X-Requested-With': 'XMLHttpRequest' },
      body: JSON.stringify(obj)
    }).then(r=>r.json()).then(d=>{
      if(d.success){
        if(d.term_date){
          const t = d.term_date;
          const tbody = document.querySelector('table tbody');
          const action = this.dataset.action || '';
          if(action){
            const existing = tbody.querySelector(`.edit[data-url="${action}"]`);
            if(existing){
              const tr = existing.closest('tr');
              tr.querySelector('td:nth-child(1) strong').textContent = t.year;
              tr.querySelector('td:nth-child(2) .badge').textContent = t.term;
              tr.querySelector('td:nth-child(3)').textContent = t.start_date;
              tr.querySelector('td:nth-child(4)').textContent = t.end_date;
            }
          } else {
            const row = document.createElement('tr');
            const editUrlNew = '{% url "edit_term_date" 0 %}'.replace('/0/', `/${t.id}/`);
            const deleteUrlNew = '{% url "delete_term_date" 0 %}'.replace('/0/', `/${t.id}/`);
            row.innerHTML = `<td><strong>${t.year}</strong></td><td><span class="badge">${t.term}</span></td><td>${t.start_date}</td><td>${t.end_date}</td><td class="actions"><i class="fas fa-edit edit" data-url="${editUrlNew}" data-year="${t.year}" data-term="${t.term}" data-start="${t.start_date}" data-end="${t.end_date}"></i> <i class="fas fa-trash delete delete-btn" data-url="${deleteUrlNew}"></i></td>`;
            tbody.prepend(row);
            // attach handlers to the newly inserted row so buttons work immediately
            attachRowHandlers(row);
          }
          closeModal();
          const n = document.getElementById('notif'); n.textContent = 'Saved'; n.style.display = 'block'; setTimeout(()=>n.style.display='none',2000);
          return;
        }
        location.reload();
      } else { alert(d.error || 'Failed'); }
    }).catch(err=>{ console.error(err); alert('Network error'); });
  });
}

document.querySelectorAll('.edit').forEach(function(btn){
  btn.addEventListener('click', function(){
    const url = this.dataset.url;
    document.getElementById('modalTitle').textContent = 'Edit Term Date';
    document.getElementById('termForm').dataset.action = url;
    document.getElementById('id_year').value = this.dataset.year || '';
    document.getElementById('id_term').value = this.dataset.term || 'Term 1';
    document.getElementById('id_start').value = this.dataset.start || '';
    document.getElementById('id_end').value = this.dataset.end || '';
    document.getElementById('termModal').style.display = 'flex';
  });
});

document.querySelectorAll('.delete-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    if(!confirm('Delete this term date?')) return;
    const url = this.dataset.url;
    fetch(url, { method: 'POST', credentials: 'same-origin', headers: { 'X-CSRFToken': getCookie('csrftoken'), 'X-Requested-With': 'XMLHttpRequest' } })
      .then(resp => { if(resp.ok) return resp.json().catch(()=>({success:true})); throw new Error('Delete failed'); })
      .then(data => { if(data && data.success === false){ alert(data.error || 'Delete failed'); return; } location.reload(); })
      .catch(err => { console.error(err); alert('Could not delete term date'); });
  });
});

// Open-create button binding
const openCreateBtn = document.getElementById('open-create');
if(openCreateBtn){ openCreateBtn.addEventListener('click', openModal); }

// Helper to attach handlers to a newly inserted row
function attachRowHandlers(row){
  const editBtn = row.querySelector('.edit');
  const delBtn = row.querySelector('.delete-btn');
  if(editBtn){
    editBtn.addEventListener('click', function(){
      const url = this.dataset.url;
      document.getElementById('modalTitle').textContent = 'Edit Term Date';
      document.getElementById('termForm').dataset.action = url;
      document.getElementById('id_year').value = this.dataset.year || '';
      document.getElementById('id_term').value = this.dataset.term || 'Term 1';
      document.getElementById('id_start').value = this.dataset.start || '';
      document.getElementById('id_end').value = this.dataset.end || '';
      document.getElementById('termModal').style.display = 'flex';
    });
  }
  if(delBtn){
    delBtn.addEventListener('click', function(){
      if(!confirm('Delete this term date?')) return;
      const url = this.dataset.url;
      fetch(url, { method: 'POST', credentials: 'same-origin', headers: { 'X-CSRFToken': getCookie('csrftoken'), 'X-Requested-With': 'XMLHttpRequest' } })
        .then(resp => { if(resp.ok) return resp.json().catch(()=>({success:true})); throw new Error('Delete failed'); })
        .then(data => { if(data && data.success === false){ alert(data.error || 'Delete failed'); return; } location.reload(); })
        .catch(err => { console.error(err); alert('Could not delete term date'); });
    });
  }
}
</script>

{% endblock %}
